name: MACore
version: 1.1.0
main: net.methadrenaline.smpcreative.macore.MACorePlugin
api-version: '1.21'
author: METHADRENALINE
description: Lightweight chat and teleport requests for SMP&Creative backend servers.
softdepend: [MALang]
commands:
  tpa:
    description: Request teleportation to a player.
    usage: /tpa <player>
  tpyes:
    description: Accept a teleport request.
    usage: /tpyes [player]
    aliases: [tpaccept]
  tpno:
    description: Deny a teleport request.
    usage: /tpno [player]
    aliases: [tpdeny]
